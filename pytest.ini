[pytest]
DJANGO_SETTINGS_MODULE = core.settings
python_files = tests.py test_*.py *_tests.py
addopts =
    --cov=.
    --cov-report=term
    --cov-report=html
    --cov-fail-under=80

[coverage:run]
omit =
    */migrations/*
    */admin.py
    */apps.py
    manage.py
    core/asgi.py
    core/wsgi.py