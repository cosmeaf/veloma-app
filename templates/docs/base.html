<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloma Docs</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome 6 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        :root {
            /* Palette Modern Dark */
            --bg-body: #0f1115;
            --bg-sidebar: #161b22; 
            --bg-glass: rgba(22, 27, 34, 0.85);
            
            /* Text */
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --text-tertiary: #6e7681;
            
            /* Accents */
            --accent: #58a6ff;      /* Azul Tech */
            --accent-glow: rgba(88, 166, 255, 0.15);
            --border: #30363d;
            --border-hover: #8b949e;
            
            /* Sidebar Specifics */
            --sidebar-width: 280px;
            --item-height: 36px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            min-height: 100vh;
        }

        /* ─── MODERN SIDEBAR ─── */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sidebar-header {
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-sidebar);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .brand i { color: var(--accent); }

        .btn-close {
            display: none;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            margin-left: auto;
            font-size: 1.2rem;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1rem;
            
            /* Custom Scrollbar Moderna */
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        
        .sidebar-content::-webkit-scrollbar { width: 6px; }
        .sidebar-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .sidebar-content::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        /* ─── NAVIGATION GROUPS (Folders) ─── */
        .nav-group { margin-bottom: 0.25rem; }

        .nav-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .nav-group-header:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.03);
        }

        .group-title-flex {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .group-title-flex i {
            color: var(--text-tertiary);
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        /* Setinha de rotação */
        .chevron {
            font-size: 0.7rem;
            transition: transform 0.3s ease;
            color: var(--text-tertiary);
        }

        /* Estado: Grupo Aberto */
        .nav-group.open > .nav-group-header .chevron {
            transform: rotate(90deg);
        }
        
        .nav-group.open > .nav-group-header .group-title-flex i {
            color: var(--accent); /* Ícone do módulo brilha quando aberto */
        }
        
        .nav-group.open > .nav-group-header {
            color: var(--text-primary);
        }

        /* ─── DROPDOWN CONTENT (Accordion) ─── */
        .nav-dropdown {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-group.open > .nav-dropdown {
            grid-template-rows: 1fr;
        }

        .nav-list {
            overflow: hidden;
            padding-left: 0.5rem; /* Indentação visual sutil */
        }

        /* ─── NAV ITEMS (Links) ─── */
        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.5rem 0.75rem 0.5rem 2.25rem; /* Indentado alinhado com o texto do pai */
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            border-radius: 6px;
            margin-top: 2px;
            transition: all 0.2s;
            border-left: 2px solid transparent;
            position: relative;
        }

        .nav-link i {
            font-size: 0.85rem;
            width: 16px;
            text-align: center;
            transition: color 0.2s;
        }

        /* Hover State */
        .nav-link:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.03);
        }

        /* Active State (Professional Glow) */
        .nav-link.active {
            color: var(--accent);
            background: var(--accent-glow);
            border-left-color: var(--accent);
            font-weight: 500;
        }
        
        .nav-link.active i {
            color: var(--accent);
        }

        /* ─── MAIN CONTENT ─── */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            height: 64px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            background: rgba(15, 17, 21, 0.8);
            backdrop-filter: blur(10px); /* Efeito Glass */
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .btn-menu {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            margin-right: 1rem;
        }

        .content-body {
            max-width: 960px;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
            width: 100%;
        }

        /* Typography & Code */
        h1 { font-size: 2.5rem; margin-bottom: 1.5rem; letter-spacing: -1px; color: var(--text-primary); }
        h2 { font-size: 1.8rem; margin-top: 2.5rem; margin-bottom: 1rem; color: var(--text-primary); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        p { color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 1.05rem; }

        pre {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.2rem;
            overflow-x: auto;
            margin: 1.5rem 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }
        
        code { font-family: 'JetBrains Mono', monospace; color: #79c0ff; }
        
        /* Mobile Responsive */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .btn-menu, .btn-close { display: block; }
            
            /* Overlay Escuro */
            .overlay {
                position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
                backdrop-filter: blur(3px); z-index: 90;
                opacity: 0; pointer-events: none; transition: opacity 0.3s;
            }
            .overlay.active { opacity: 1; pointer-events: auto; }
        }
    </style>
</head>
<body>

    <!-- Overlay Mobile -->
    <div class="overlay" id="overlay"></div>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <i class="fa-brands fa-python"></i> <!-- Ícone da Tech -->
                <span>Veloma</span>
            </div>
            <button class="btn-close" id="closeSidebar"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="sidebar-content">
            {% for module in modules %}
            <div class="nav-group {% if module.is_open %}open{% endif %}">
                
                <!-- Cabeçalho do Grupo (Pasta) -->
                <button class="nav-group-header">
                    <div class="group-title-flex">
                        <!-- Ícone Dinâmico Vindo do Python -->
                        <i class="fa-solid {{ module.icon }}"></i>
                        <span>{{ module.name }}</span>
                    </div>
                    <i class="fa-solid fa-chevron-right chevron"></i>
                </button>

                <!-- Lista de Páginas (Dropdown) -->
                <div class="nav-dropdown">
                    <div class="nav-list">
                        {% for page in module.pages %}
                        <a href="/docs/{{ module.name }}/{{ page.name }}/" 
                           class="nav-link {% if page.is_active %}active{% endif %}">
                            <!-- Ícone de arquivo -->
                            <i class="fa-regular fa-file-code"></i>
                            {{ page.name }}
                        </a>
                        {% endfor %}
                    </div>
                </div>

            </div>
            {% endfor %}
            
            <!-- Rodapé da Sidebar (Opcional) -->
            <div style="margin-top: 3rem; padding: 1rem; border-top: 1px solid var(--border); text-align: center;">
                <p style="font-size: 0.75rem; color: var(--text-tertiary); margin:0;">
                    &copy; 2024 Veloma Inc.<br>v1.0.0
                </p>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <header class="top-bar">
            <button class="btn-menu" id="openSidebar"><i class="fa-solid fa-bars"></i></button>
            <!-- Breadcrumbs simples -->
            <nav style="font-size: 0.85rem; color: var(--text-tertiary);">
                <span style="color: var(--accent);">Docs</span> 
                <span style="margin: 0 8px;">/</span> 
                <span>Reference</span>
            </nav>
        </header>

        <div class="content-body">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <script>
        // Accordion Logic
        document.querySelectorAll('.nav-group-header').forEach(header => {
            header.addEventListener('click', () => {
                const group = header.parentElement;
                group.classList.toggle('open');
            });
        });

        // Mobile Menu Logic
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const openBtn = document.getElementById('openSidebar');
        const closeBtn = document.getElementById('closeSidebar');

        function toggleMenu(show) {
            if (show) {
                sidebar.classList.add('active');
                overlay.classList.add('active');
            } else {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            }
        }

        openBtn.addEventListener('click', () => toggleMenu(true));
        closeBtn.addEventListener('click', () => toggleMenu(false));
        overlay.addEventListener('click', () => toggleMenu(false));
    </script>
</body>
</html>
