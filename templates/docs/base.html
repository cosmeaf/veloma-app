<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloma Docs</title>

    <!-- Google Fonts - futuristic feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        :root {
            --bg: #0a0e17;
            --sidebar-bg: linear-gradient(135deg, #0f1626 0%, #111827 100%);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-dark: #4f46e5;
            --border: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* ─── Sidebar ──────────────────────────────────────── */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            color: var(--text);
            transition: transform 0.3s ease;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 1000;
            overflow-y: auto;
            padding: 1.5rem 1rem;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .sidebar-header h1 {
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, #c084fc, #6366f1, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
            display: none;
        }

        .sidebar h3 {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin: 1.5rem 0 0.75rem;
            padding-left: 0.5rem;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 0.62rem 0.85rem;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.95rem;
            border-radius: 0.5rem;
            margin: 0.18rem 0;
            transition: all 0.18s ease;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(99, 102, 241, 0.15);
            color: white;
        }

        .sidebar a i {
            margin-right: 0.9rem;
            width: 18px;
            text-align: center;
            opacity: 0.7;
        }

        .sidebar a:hover i {
            opacity: 1;
        }

        /* Content */
        .content {
            margin-left: 260px;
            flex: 1;
            overflow-y: auto;
            transition: margin-left 0.3s ease;
        }

        .page {
            max-width: 960px;
            margin: 2.5rem auto;
            padding: 0 2rem 4rem;
        }

        .page h1 {
            font-size: 2.4rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #e0e7ff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Mobile - sidebar vira dropdown / gaveta */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .content {
                margin-left: 0;
            }
            .toggle-btn {
                display: block;
            }
        }

        /* Código e tabelas */
        pre {
            background: #0f1626;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 1.3rem;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.92rem;
            margin: 1.5rem 0;
        }

        code {
            font-family: 'JetBrains Mono', monospace;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.95rem;
        }

        th, td {
            padding: 0.9rem 1.1rem;
            border: 1px solid #1e293b;
            text-align: left;
        }

        th {
            background: rgba(30, 41, 59, 0.7);
            color: #e2e8f0;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>Veloma Docs</h1>
            <button class="toggle-btn" id="closeSidebar">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        {% for module in modules %}
            <h3>{{ module.name }}</h3>
            {% for page in module.pages %}
                <a href="/docs/{{ module.name }}/{{ page }}/">
                    <i class="fa-solid fa-file-lines"></i>
                    {{ page }}
                </a>
            {% endfor %}
        {% endfor %}
    </div>

    <div class="content">
        <div class="page">
            <!-- Botão hambúrguer visível só em mobile -->
            <button class="toggle-btn" id="openSidebar" style="font-size:1.6rem; margin-bottom:1.5rem; background:none; border:none; color:var(--accent); cursor:pointer;">
                <i class="fa-solid fa-bars"></i>
            </button>

            {% block content %}
            {% endblock %}
        </div>
    </div>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    const openBtn = document.getElementById('openSidebar');
    const closeBtn = document.getElementById('closeSidebar');

    openBtn.addEventListener('click', () => {
        sidebar.classList.add('open');
    });

    closeBtn.addEventListener('click', () => {
        sidebar.classList.remove('open');
    });

    // Fechar ao clicar fora (opcional)
    document.addEventListener('click', (e) => {
        if (window.innerWidth > 1024) return;
        if (!sidebar.contains(e.target) && !openBtn.contains(e.target)) {
            sidebar.classList.remove('open');
        }
    });
</script>

</body>
</html>
